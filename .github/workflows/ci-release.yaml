name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ----------------------------------------------------------------
  # Run crossplane render against all test fixtures.
  # Requires Docker (available on ubuntu-latest) to execute functions.
  # ----------------------------------------------------------------
  test:
    name: Render Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-crossplane-cli

      - name: Run render tests
        run: bash tests/render-all.sh

  # ----------------------------------------------------------------
  # Build the Configuration xpkg, push to GHCR, create GitHub Release.
  # Runs only on version tags (v*).
  # ----------------------------------------------------------------
  release:
    name: Build & Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      packages: write   # push to GHCR

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-crossplane-cli

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build xpkg
        run: |
          crossplane xpkg build \
            --package-root=package \
            --package-file=configuration-objectstorage.xpkg

      - name: Push xpkg
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository_owner }}/configuration-objectstorage" | tr '[:upper:]' '[:lower:]')
          crossplane xpkg push -f configuration-objectstorage.xpkg ${IMAGE}:${{ github.ref_name }}
          crossplane xpkg push -f configuration-objectstorage.xpkg ${IMAGE}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: configuration-objectstorage.xpkg
          generate_release_notes: true
